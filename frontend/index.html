<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="BASS PHONK - Premium Phonk Music Streaming. Brazilian Phonk, Drift, Memphis, Cowbell beats with bass boost, 8D audio, and stunning visualizers." />
    <meta name="keywords" content="phonk, bass, music, streaming, drift, brazilian phonk, memphis, cowbell, bass boost, 8D audio" />
    <meta property="og:title" content="BASS PHONK - Premium Phonk Streaming" />
    <meta property="og:description" content="Experience phonk like never before. Bass boost, 8D audio, custom EQ, and stunning visualizers." />
    <meta property="og:type" content="website" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>BASS PHONK</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000000;
        overflow: hidden;
      }
      #splash-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000000;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #splash-loader.hide {
        opacity: 0;
        visibility: hidden;
      }
      #splash-loader h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 3rem;
        font-weight: 900;
        letter-spacing: 6px;
        background: linear-gradient(135deg, #FF0040, #BF00FF, #00FFFF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      #splash-loader .loader-bar {
        width: 200px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        margin-top: 24px;
        overflow: hidden;
      }
      #splash-loader .loader-bar::after {
        content: '';
        display: block;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, #FF0040, #BF00FF, #00FFFF);
        border-radius: 3px;
        animation: splash-slide 1.2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.02); }
      }
      @keyframes splash-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div id="splash-loader">
      <h1>BASS PHONK</h1>
      <div class="loader-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash-loader');
          if (splash) splash.classList.add('hide');
          setTimeout(() => { if (splash) splash.remove(); }, 600);
        }, 800);
      });
    </script>
  </body>
</html>
